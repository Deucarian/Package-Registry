name: Deucarian architecture validation

on:
  workflow_call:
    inputs:
      audit-root:
        description: Optional path containing one checkout per repository.
        required: false
        type: string
        default: ""
      registry-ref:
        description: Package Registry ref to validate.
        required: false
        type: string
        default: 2f10d0dcc049b63474c6e96ed929127d93560b33

jobs:
  validate-architecture:
    name: Validate registry architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Package Registry
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: Deucarian/Package-Registry
          ref: ${{ inputs.registry-ref }}
          path: package-registry

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Run validator tests
        shell: bash
        working-directory: package-registry
        run: python -m unittest discover Tools/tests

      - name: Validate registry governance artifacts
        shell: bash
        run: |
          python package-registry/Tools/deucarian_package_validator.py \
            --ci \
            --registry-root package-registry \
            --repository-root package-registry \
            --config package-registry/deucarian-package.json

      - name: Validate organization configs
        if: ${{ inputs.audit-root != '' }}
        shell: bash
        run: |
          python package-registry/Tools/deucarian_package_validator.py \
            --ci \
            --registry-root package-registry \
            --all \
            --audit-root "${{ inputs.audit-root }}"
