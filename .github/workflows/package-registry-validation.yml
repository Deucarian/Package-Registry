name: Validate package registry

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  validate-registry:
    name: Validate registry governance artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'schedule' && 'develop' || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install audit parser
        shell: bash
        run: python -m pip install -r Tools/audit-requirements.txt

      - name: Run validator and audit tests
        shell: bash
        run: python -m unittest discover Tools/tests

      - name: Exercise deterministic catalog projection
        shell: bash
        run: |
          installer_root="$RUNNER_TEMP/package-installer"
          bootstrap_root="$RUNNER_TEMP/bootstrap"
          python Tools/project_package_catalogs.py \
            --installer-root "$installer_root" \
            --bootstrap-root "$bootstrap_root"
          python Tools/project_package_catalogs.py \
            --installer-root "$installer_root" \
            --bootstrap-root "$bootstrap_root" \
            --check

      - name: Validate Package Registry config
        shell: bash
        run: |
          python Tools/deucarian_package_validator.py \
            --ci \
            --registry-root . \
            --repository-root . \
            --config deucarian-package.json

      - name: Audit check
        shell: bash
        env:
          AUDIT_REF: ${{ github.event_name == 'schedule' && 'develop' || ((github.ref_name == 'main' || github.base_ref == 'main') && 'main' || 'develop') }}
        run: |
          python Tools/Generate-DeucarianAudit.py \
            --audit-root "$RUNNER_TEMP/deucarian-org-audit" \
            --output-root . \
            --organization Deucarian \
            --ref "$AUDIT_REF" \
            --authoritative \
            --format all \
            --provision \
            --check
