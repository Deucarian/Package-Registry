name: Validate package registry

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  validate-registry:
    name: Validate registry governance artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Run validator and audit tests
        shell: bash
        run: python -m unittest discover Tools/tests

      - name: Exercise deterministic catalog projection
        shell: bash
        run: |
          installer_root="$RUNNER_TEMP/package-installer"
          bootstrap_root="$RUNNER_TEMP/bootstrap"
          python Tools/project_package_catalogs.py \
            --installer-root "$installer_root" \
            --bootstrap-root "$bootstrap_root"
          python Tools/project_package_catalogs.py \
            --installer-root "$installer_root" \
            --bootstrap-root "$bootstrap_root" \
            --check

      - name: Validate Package Registry config
        shell: bash
        run: |
          python Tools/deucarian_package_validator.py \
            --ci \
            --registry-root . \
            --repository-root . \
            --config deucarian-package.json

      - name: Audit check
        shell: bash
        run: |
          if [ ! -d ../_deucarian_org_audit ]; then
            echo "Skipping audit check: ../_deucarian_org_audit is not present in this runner."
            exit 0
          fi
          python -m pip install -r Tools/audit-requirements.txt
          python Tools/Generate-DeucarianAudit.py \
            --audit-root ../_deucarian_org_audit \
            --output-root . \
            --organization Deucarian \
            --ref ci \
            --authoritative \
            --format all \
            --check
